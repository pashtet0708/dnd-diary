<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Дневник кампании D&D</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="hero">
    <h1 id="campaign-title">Хроники</h1>
    <p id="campaign-subtitle"></p>
    <div class="ornament">❧ ⚔ ❧</div>
  </header>

  <div class="layout">

    <aside class="side side-left">
      <details class="panel" id="nav-panel" open>
        <summary class="panel-title">Дни</summary>
        <nav class="day-nav" id="day-nav"></nav>
      </details>
    </aside>

    <main class="timeline" id="timeline"></main>

    <aside class="side side-right">
      <details class="panel" id="party-panel">
        <summary class="panel-title">Отряд</summary>
        <div id="party"></div>
      </details>
      <details class="panel" id="quests-panel">
        <summary class="panel-title">Журнал заданий</summary>
        <div id="quests"></div>
      </details>
    </aside>

  </div>

  <footer>Записано хранителем хроник • <span id="year"></span></footer>

  <div class="lightbox" id="lightbox"><img src="" alt=""></div>

  <script src="data.js"></script>
  <script src="story.js"></script>
  <script src="app.js"></script>
</body>
</html>
